<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw Tech Brief</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <p class="eyebrow">OpenClaw</p>
          <h1>Tech Brief</h1>
        </div>
        <button id="refreshButton" type="button" title="Gerar agora">
          <span>Atualizar</span>
        </button>
      </section>

      <section class="brief-hero" aria-label="Resumo do briefing">
        <div>
          <p id="dateLabel">Carregando...</p>
          <h2 id="summary">Buscando as noticias mais relevantes de tecnologia.</h2>
        </div>
        <div class="signal-panel">
          <span class="signal-label">Topicos</span>
          <div id="topics" class="topics"></div>
        </div>
      </section>

      <section>
        <div class="section-title">
          <h2>Principais noticias</h2>
          <span id="newsCount"></span>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>

      <section class="papers-section">
        <div class="section-title">
          <h2>Papers relevantes</h2>
          <span id="paperCount"></span>
        </div>
        <div id="paperList" class="news-list paper-list"></div>
      </section>
    </main>

    <template id="newsCardTemplate">
      <article class="news-card">
        <div class="news-meta">
          <span class="source"></span>
          <span class="score"></span>
        </div>
        <span class="type"></span>
        <h3></h3>
        <p class="summary"></p>
        <p class="insight"></p>
        <a target="_blank" rel="noreferrer">Abrir fonte</a>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
